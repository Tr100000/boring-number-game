<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>Boring Number Game</title>
  </head>
  <body>
    <div id="app">
      <p id="debugScore" class="extra"></p>
      <p id="debugMistakes" class="extra"></p>
      <p id="cheat" class="extra"></p>
      <p id="countdown"></p>
      <p id="number"></p>
      <input id="numInput" type="number" min="2" autofocus />
    </div>
    <dialog id="endDialog">
      <p id="modeText"></p>
      <p id="totalText"></p>
      <p id="mistakesText"></p>
      <p id="scoreText"></p>
    </dialog>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
